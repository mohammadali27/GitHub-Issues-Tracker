<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- daisyUI and Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section
      class="flex items-center justify-center mt-20 shadow-xl w-4/12 p-10 mx-auto"
    >
      <div class="">
        <div class="flex items-center justify-center flex-col gap-2 mb-2">
          <img class="" src="./assets/github-logo.png" alt="" />
          <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
          <p>Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset space-y-3 rounded-box w-xs p-4">
          <p>Username</p>

          <input id="username" type="text" class="input" placeholder="Enter Username" />

          <p>Enter Password</p>
          <input id="password" type="password" class="input" placeholder="Enter Password" />
          
            <button id="button" class="btn btn-primary w-full mt-4">Sign In</button>
           
          
        </fieldset>
      </div>
    </section>
    <script>
       
        
    </script>
    <script src="./script/script.js"></script>
  </body>
</html>
