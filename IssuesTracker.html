<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- daisyUI and Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- cdn fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <section class="w-11/12 mx-auto mt-4">
      <nav class="sm:grid sm:grid-cols-1 md:flex md:justify-between">
        <div class="flex items-center gap-2">
          <img class="w-6" src="./assets/github-logo.png" alt="" />
          <p class="font-semibold text-2xl">GitHub Issues Tracker</p>
        </div>
        <div class="">
          <div class="join gap-2">
            <div class="">
              <label class="input validator join-item">
                <i class="fa-brands fa-sistrix"></i>
                <input
                  type="email"
                  class=""
                  placeholder=" Search issues..."
                  required
                />
              </label>
              <div class="validator-hint hidden">Search issues...</div>
            </div>
            <button class="btn btn-primary join-item">
              <i class="fa-solid fa-plus"></i>New Issue
            </button>
          </div>
        </div>
      </nav>
    </section>
    <section class="bg-white mt-10">
      <div class="flex p-5 gap-5 w-10/12 mx-auto shadow-sm">
        <div id="allDiv" class="btn btn-primary px-10">All</div>
        <div id="openDiv" class="btn px-10">Open</div>
        <div id="closedDiv" class="btn px-10">Closed</div>
      </div>
    </section>
    <section
      class="flex gap-5 mt-5 w-10/12 mx-auto p-3 justify-between shadow-sm"
    >
      <div class="flex items-center gap-2">
        <div class="bg-[#ECE4FF] rounded-lg">
          <img src="./assets/Aperture.png" alt="" />
        </div>

        <div class="grid grid-cols-1">
          <p class="font-bold"><span id="totalIssues">0</span> Issues</p>
          <p>Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="bg-[#00a96e] rounded-lg w-3 h-3"></span>
        <p>Open</p>
        <span class="bg-[#a85587] rounded-lg w-3 h-3"></span>
        <p>Closed</p>
      </div>
    </section>
    <section
      id="gitHtbTotalIssues"
      class="w-10/12 sm:grid sm:grid-cols-1 md:grid md:grid-cols-4 gap-3 mx-auto bg-[#e4e4e7]"
    >
      <!-- <div class=" p-2 grid grid-cols-4 mx-auto   gap-2">
        
      </div> -->
    </section>
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="ditiles-contener" class=""></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
        <form method="dialog" class="modal-backdrop">
          <button>close</button>
        </form>
    </dialog>

    <script src="./script/issues.js"></script>
  </body>
</html>
